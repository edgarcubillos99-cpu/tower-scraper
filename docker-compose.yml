services:
  scraper:
    build: .
    container_name: tower-scraper
    restart: always
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-sse}
      - APP_PORT=${APP_PORT:-8080}
      - MCP_API_KEY=${MCP_API_KEY}
      - TOWER_USERNAME=${TOWER_USERNAME}
      - TOWER_PASSWORD=${TOWER_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes: #para poder ver los archivos de la aplicacion
      - ./:/app